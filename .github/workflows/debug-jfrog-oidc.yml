name: Diagnostic OIDC Debugger
on: 
  workflow_dispatch: # Allows you to trigger this test manually via the GitHub Actions UI

jobs:
  oidc_debug:
    runs-on: ubuntu-latest
    name: Check GitHub JWT Claims
    
    # CRITICAL: If permissions are missing, GitHub blocks OIDC token creation
    permissions:
      id-token: write 
      contents: read   

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install the JFrog CLI first so the system can find the 'jf' command
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: jonw-apac/spring-petclinic@github
        env:
          JF_URL: https://${{ vars.JF_URL }}

      # 2. Run the diagnostic test script now that 'jf' is installed
      - name: Fetch and Test OIDC Token
        uses: actions/github-script@v7
        env:
          JF_URL: https://${{ vars.JF_URL }}
        with:
          script: |
            const id_token = await core.getIDToken();
            const { execSync } = require('child_process');
            
            try {
              console.log("Exchanging OIDC token with JFrog Platform...");
              
              // This will now execute successfully because 'jf' exists
              const output = execSync(`jf eot jonw-apac/spring-petclinic@github "${id_token}" --url="${process.env.JF_URL}"`, { encoding: 'utf-8' });
              
              console.log(output);
              core.info("✅ OIDC Token parsed and validated successfully by JFrog!");
            } catch (error) {
              // Intercept and print the real server error message from JFrog
              const jfrogError = error.stdout || error.stderr || error.message;
              core.error("JFrog CLI Output on Failure:\n" + jfrogError);
              core.setFailed(`❌ Token exchange validation failed.`);
            }
