name: Diagnostic OIDC Debugger
on: 
  workflow_dispatch: # Allows you to trigger this test manually via the GitHub Actions UI

jobs:
  oidc_debug:
    runs-on: ubuntu-latest
    name: Check GitHub JWT Claims
    
    # CRITICAL: If permissions are missing, GitHub blocks OIDC token creation
    permissions:
      id-token: write 
      contents: read   

    steps:
      - name: Fetch and Test OIDC Token
        uses: actions/github-script@v7
        env:
          JF_URL: https://${{ vars.JF_URL }}
        with:
          script: |
            // 1. Request a live OIDC ID Token from GitHub's internal runner provider
            const id_token = await core.getIDToken();
            
            // 2. Execute the jf eot test command using Node's native child_process module
            const { execSync } = require('child_process');
            try {
              console.log("Exchanging OIDC token with JFrog Platform...");
              
              // Run the CLI command directly and capture console outputs
              const output = execSync(`jf eot github-jfrog-app-provider "${id_token}" --url="${process.env.JF_URL}"`, { encoding: 'utf-8' });
              
              console.log(output);
              core.info("✅ OIDC Token parsed and validated successfully by JFrog!");
            } catch (error) {
              // Print the full error payload returned from the JFrog CLI
              core.error("JFrog CLI Output on Failure:\n" + error.stdout || error.message);
              core.setFailed(`❌ Token exchange validation failed.`);
            }
