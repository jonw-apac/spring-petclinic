name: Maven Build Spring Petclinic with JFrog Artifactory

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  actions: read           # for detecting the Github Actions environment
  id-token: write         # for creating OIDC tokens for signing
  packages: write         # for uploading attestations
  contents: read          # read the contents permission
  security-events: write  # for uploading code scanning

jobs:
  build:
    name: 'Build Spring Petclinic'
    env:
      JFROG_CLI_BUILD_NAME: 'Petclinic from GitHub workflow'
      JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}
      JFROG_CLI_BUILD_PROJECT: ${{ vars.JF_PROJECT }}
      JFROG_CLI_LOG_LEVEL: DEBUG
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]

    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      - 
        name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java}}
          distribution: 'temurin'
          cache: 'maven'

      - 
        name: Set up Maven
        uses: s4u/setup-maven-action@v2.0.0
        with:
          java-version: ${{matrix.java}}
          maven-version: '3.8.6'
      - 
        name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ vars.JF_URL }}/
        with:
          oidc-provider-name: jonw-apac/spring-petclinic@github
      -
        name: Configure Build
        run: |
          jf mvn-config --repo-resolve-releases clientapp-libs-release --repo-resolve-snapshots clientapp-libs-snapshot --repo-deploy-releases clientapp-libs-release-local --repo-deploy-snapshots clientapp-libs-snapshot-local
          echo "petclinicArtifactName=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV
          echo "petclinicVersion=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - 
        name: Diagnostic - Test JFrog Plugin Resolution
        run: |
          echo "Testing plugin download using native JFrog cURL integration..."
          
          # jf rt curl automatically authenticates using the active OIDC session context
          jf rt curl "clientapp-libs-release/com/jfrog/maven-dep-tree/1.1.5/maven-dep-tree-1.1.5.pom"
        continue-on-error: true
      -
        name: JFrog Curation Audit
        run: |
          # 1. Hide the Gradle file to focus exclusively on Maven
          if [ -f "build.gradle" ]; then mv build.gradle build.gradle.bak; fi
          
          # 2. Recommended: Pre-resolve dependencies so Curation can intercept the tree accurately
          # ./mvnw dependency:go-offline -B
          
          # 3. Trigger the curation audit
          jf curation-audit #--include-cached-packages
          
          # 4. Restore the Gradle file
          if [ -f "build.gradle.bak" ]; then mv build.gradle.bak build.gradle; fi

        env:
          JFROG_CLI_LOG_LEVEL: DEBUG
      -
        name: Audit Source Code
        run: |
          jf audit --licenses --format=table --mvn=true
      -
        name: Build Maven package
        run: |
          jf mvn clean install -DskipTests=true -Dtest=!PostgresIntegrationTests* '-Dspring-javaformat.skip=true' --project ${{ env.JFROG_CLI_BUILD_PROJECT }} -Dartifactory.publish.artifacts=false
      -
        name: Scan Maven package
        run: |
          jf scan --vuln --licenses --format=json ./target/${{ env.petclinicArtifactName }}-${{ env.petclinicVersion }}.jar
      -
        name: Deploy Maven package to Artifactory
        if: github.ref == 'refs/heads/main'
        run: |
          jf mvn deploy -Dmaven.main.skip=true -Dmaven.install.skip=true -DskipTests --project ${{ env.JFROG_CLI_BUILD_PROJECT }}

      -
        name: Build Docker imagew               
        if: github.ref == 'refs/heads/main'
        run: |
          ./mvnw spring-boot:build-image -Dspring-boot.build-image.imageName=jonwonboarding2.jfrog.io/clientapp-docker/${{ env.petclinicArtifactName }}:${{ env.petclinicVersion }}

      -
        name: Push Docker image & record build info
        if: github.ref == 'refs/heads/main'
        run: |
          # The flags here tell the CLI to attach this push to your active build workflow tracking
          jf docker push jonwonboarding2.jfrog.io/clientapp-docker/${{ env.petclinicArtifactName }}:${{ env.petclinicVersion }} \
            --build-name="${{ env.JFROG_CLI_BUILD_NAME }}" --build-number="${{ env.JFROG_CLI_BUILD_NUMBER }}" --project=${{ env.JFROG_CLI_BUILD_PROJECT }}

      -
        name: Scan Docker image directly (Optional SCA)
        if: github.ref == 'refs/heads/main'
        run: |
          jf docker scan jonwonboarding2.jfrog.io/clientapp-docker/${{ env.petclinicArtifactName }}:${{ env.petclinicVersion }} --severity='HIGH,CRITICAL' --vuln

      -
        name: Publish build info
        if: github.ref == 'refs/heads/main'
        run: |
          # This registers the overall build metadata in Artifactory
          jf rt build-publish --project ${{ env.JFROG_CLI_BUILD_PROJECT }} "${{ env.JFROG_CLI_BUILD_NAME }}" "${{ env.JFROG_CLI_BUILD_NUMBER }}"

      -
        name: Scan build
        if: github.ref == 'refs/heads/main'
        run: |
          # Now that the build is published and indexed, this command will succeed!
          jf build-scan --vuln --fail=false --project ${{ env.JFROG_CLI_BUILD_PROJECT }} "${{ env.JFROG_CLI_BUILD_NAME }}" "${{ env.JFROG_CLI_BUILD_NUMBER }}"
      -
        name: Create Release Bundle
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== Generating Release Bundle ==="
          echo '
                {
                  "builds": [
                    {
                      "name": "${{ env.JFROG_CLI_BUILD_NAME }}",
                      "number": "${{ env.JFROG_CLI_BUILD_NUMBER }}",
                      "project": "${{ env.JFROG_CLI_BUILD_PROJECT }}"
                    }
                  ]
                }
          ' > builds.json
          jf release-bundle-create --builds=./builds.json --project ${{ env.JFROG_CLI_BUILD_PROJECT }} --signing-key jonw-signing "${{ env.petclinicArtifactName }}" "${{ env.petclinicVersion }}-build${{ env.JFROG_CLI_BUILD_NUMBER }}"